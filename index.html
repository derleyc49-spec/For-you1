<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

<h2>Digite a senha 🩷</h2>
<input id="senha" type="password" style="padding:10px;border-radius:10px;">
<br><br>
<button onclick="entrar()" style="padding:10px 20px;border:none;border-radius:10px;background:pink;">
Entrar
</button>

<div id="app" style="display:none;margin-top:30px;">

<img src="foto.JPG" width="150" style="border-radius:50%;">

<h1>Mary 🩷</h1>

<textarea id="texto" placeholder="Escreve aqui..."
style="width:90%;height:200px;border-radius:10px;padding:10px;">
</textarea>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "COLE_AQUI",
  authDomain: "COLE_AQUI",
  projectId: "COLE_AQUI"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.entrar = async function(){
  if(document.getElementById("senha").value === "1234"){
    document.getElementById("app").style.display="block";

    const snap = await getDoc(doc(db,"pages","main"));
    if(snap.exists()){
      document.getElementById("texto").value = snap.data().text;
    }
  }
}

document.getElementById("texto").addEventListener("input", async (e)=>{
  await setDoc(doc(db,"pages","main"),{
    text:e.target.value
  });
});
</script>

</body>
</html>
